<section class="page-head">
  <p class="eyebrow">Admin</p>
  <h1>Review queue</h1>
  <p class="lede">Open staging groups waiting for field-level choices.</p>
</section>

{{with .Flash}}
<section class="section-block">
  <p class="notice">{{.}}</p>
</section>
{{end}}

<section class="section-block">
  <div class="review-list">
    {{range .ReviewGroups}}
    <a class="review-group-link" href="/admin/review/{{.ID}}">
      <span class="review-group-title">{{.Title}}</span>
      <span class="review-group-meta">{{.CandidateCount}} candidates · {{.DraftCount}} draft choices · {{.SourceName}}</span>
      <span class="review-group-meta">Updated {{dateShort .UpdatedAt}}</span>
    </a>
    {{else}}
    <p class="empty-state">No open review groups.</p>
    {{end}}
  </div>
</section>
